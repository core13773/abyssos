<!DOCTYPE html>
<html><body style="background:#333;padding:10px;color:#fff">
<h1>Element removal test</h1>
<div id="tests"></div>
<script>
const tests = [
  {file:'/del-path.svg', label:'1: No corner paths', border:'lime'},
  {file:'/del-opacity.svg', label:'2: No opacity attrs', border:'lime'},
  {file:'/del-transform.svg', label:'3: No transform group', border:'lime'},
  {file:'/del-illustration.svg', label:'4: No illustration (paths+badge+icons+g group)', border:'yellow'},
  {file:'/del-simple.svg', label:'5: defs + bg rect + 1 text ONLY', border:'cyan'},
  {file:'/step5.svg', label:'6: Original (control)', border:'red'},
];
let html = '';
tests.forEach((t, i) => {
  html += '<div style="margin:6px;padding:6px;background:#444">' +
    '<p style="font-size:12px">' + t.label + '</p>' +
    '<img src="' + t.file + '" width="150" style="border:2px solid ' + t.border + '">' +
    '</div>';
});
document.getElementById('tests').innerHTML = html;
</script>
</body></html>
