name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Override next.config.ts for GitHub Pages static export
      - run: |
          cat > next.config.ts << 'NEXTCONF'
          import type { NextConfig } from "next";
          const nextConfig: NextConfig = {
            output: 'export',
            trailingSlash: true,
            basePath: '/abyssos',
            assetPrefix: '/abyssos',
            images: { unoptimized: true },
          };
          export default nextConfig;
          NEXTCONF

      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /abyssos
          NEXT_PUBLIC_GA_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_ADSENSE_ID: ${{ secrets.ADSENSE_PUBLISHER_ID }}
          NEXT_PUBLIC_ADSENSE_SLOT_MAIN: ${{ secrets.ADSENSE_SLOT_MAIN }}

      # SPA fallback: inject redirect script into 404.html for GitHub Pages
      # Handles both old /game paths and new i18n /en /ko paths
      - run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const htmlPath = path.join('out', '404.html');
          if (fs.existsSync(htmlPath)) {
            let html = fs.readFileSync(htmlPath, 'utf8');
            const script = \`<script>(function(){var r=sessionStorage.getItem('__spa_redirect');if(r){sessionStorage.removeItem('__spa_redirect');window.history.replaceState(null,'',r);return;}var p=window.location.pathname,b='/abyssos',s=window.location.search+window.location.hash;var m=p.match(new RegExp('^'+b+'/(en|ko)(/|$)'));if(m){sessionStorage.setItem('__spa_redirect',p.slice(b.length)+s);window.location.replace(b+'/'+m[1]+'/');return;}if(p.startsWith(b+'/game/')||p.startsWith(b+'/')){sessionStorage.setItem('__spa_redirect',p.slice(b.length)+s);window.location.replace(b+'/');}})();</script>\`;
            html = html.replace('</head>', script + '</head>');
            fs.writeFileSync(htmlPath, html);
          }
          "

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
