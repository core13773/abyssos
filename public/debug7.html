<!DOCTYPE html>
<html><body style="background:#333;padding:10px;color:#fff">
<h1>Element-by-element isolation</h1>
<div id="tests"></div>
<script>
// Build SVGs that progressively add elements from monster-9a
const BASE_START = '<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 1050" width="750" height="1050"><defs>';
const GRADS = `
<linearGradient id="gold"><stop offset="0%" stop-color="#f0d060"/><stop offset="25%" stop-color="#daa520"/><stop offset="50%" stop-color="#f5e6a0"/><stop offset="75%" stop-color="#b8860b"/><stop offset="100%" stop-color="#f0d060"/></linearGradient>
<linearGradient id="goldV"><stop offset="0%" stop-color="#f5e6a0"/><stop offset="30%" stop-color="#daa520"/><stop offset="60%" stop-color="#b8860b"/><stop offset="100%" stop-color="#f0d060"/></linearGradient>
<linearGradient id="goldSubtle"><stop offset="0%" stop-color="#a08030"/><stop offset="50%" stop-color="#c4a040"/><stop offset="100%" stop-color="#a08030"/></linearGradient>
<radialGradient id="divineGlow" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#f5e6a0" stop-opacity="0.3"/><stop offset="50%" stop-color="#daa520" stop-opacity="0.1"/><stop offset="100%" stop-color="#1a1208" stop-opacity="0"/></radialGradient>
<linearGradient id="elemBg"><stop offset="0%" stop-color="#0a1218"/><stop offset="50%" stop-color="#0a0a10"/><stop offset="100%" stop-color="#0a1218"/></linearGradient>
<radialGradient id="elemGlow" cx="50%" cy="35%" r="40%"><stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.15"/><stop offset="100%" stop-color="#0a0a10" stop-opacity="0"/></radialGradient>`;
const DEFS_END = '</defs>';
const BASE_END = '</svg>';

const tests = [
  {
    label: 'A: Base (step4 equivalent)',
    body: '<rect width="750" height="1050" fill="url(#elemBg)"/><text x="375" y="500" text-anchor="middle" font-size="50" fill="#daa520">얼음 망자</text>'
  },
  {
    label: 'B: + corner ornaments (paths with url(#gold))',
    body: '<rect width="750" height="1050" fill="url(#elemBg)"/>' +
      '<path d="M34 52 Q34 34 52 34 M34 46.6 Q39.4 39.4 46.6 34" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.7"/>' +
      '<text x="375" y="500" text-anchor="middle" font-size="50" fill="#daa520">얼음 망자</text>'
  },
  {
    label: 'C: + frame rects with stroke="url(#gold)"',
    body: '<rect width="750" height="1050" fill="url(#elemBg)"/>' +
      '<rect x="30" y="30" width="690" height="990" rx="12" fill="none" stroke="#7ec8e3" stroke-width="4"/>' +
      '<text x="375" y="500" text-anchor="middle" font-size="50" fill="#daa520">얼음 망자</text>'
  },
  {
    label: 'D: + tier badge (green rect + white text)',
    body: '<rect width="750" height="1050" fill="url(#elemBg)"/>' +
      '<rect x="335" y="42" width="80" height="34" rx="17" fill="#22c55e" opacity="0.85"/>' +
      '<text x="375" y="66" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">MINOR</text>' +
      '<text x="375" y="500" text-anchor="middle" font-size="50" fill="#daa520">얼음 망자</text>'
  },
  {
    label: 'E: + multiple text elements (name kr + en)',
    body: '<rect width="750" height="1050" fill="url(#elemBg)"/>' +
      '<text x="375" y="950" text-anchor="middle" font-size="28" font-weight="bold" fill="#7ec8e3">얼음 망자</text>' +
      '<text x="375" y="982" text-anchor="middle" font-size="14" font-style="italic" fill="#b8dff0" opacity="0.7">Frost Wraith</text>' +
      '<text x="375" y="500" text-anchor="middle" font-size="50" fill="#daa520">얼음 망자</text>'
  },
  {
    label: 'F: + power number (large 72px text)',
    body: '<rect width="750" height="1050" fill="url(#elemBg)"/>' +
      '<circle cx="375" cy="495" r="120" fill="none" stroke="#7ec8e3" stroke-width="2" opacity="0.2"/>' +
      '<text x="375" y="505" text-anchor="middle" font-size="72" font-weight="bold" fill="#7ec8e3" opacity="0.85">3</text>' +
      '<text x="375" y="465" text-anchor="middle" font-size="14" fill="#b8dff0" opacity="0.6">POWER</text>'
  },
  {
    label: 'G: + ability box (rect + text in box)',
    body: '<rect width="750" height="1050" fill="url(#elemBg)"/>' +
      '<rect x="175" y="545" width="400" height="65" rx="8" fill="#0a1218" opacity="0.6" stroke="#7ec8e3" stroke-width="1" opacity="0.5"/>' +
      '<text x="375" y="567" text-anchor="middle" font-size="12" fill="#b8dff0" opacity="0.9">ABILITY</text>' +
      '<text x="375" y="585" text-anchor="middle" font-size="13" fill="#b8dff0" opacity="0.85">없음</text>'
  },
  {
    label: 'H: + emoji (text with ❄️)',
    body: '<rect width="750" height="1050" fill="url(#elemBg)"/>' +
      '<text x="375" y="400" text-anchor="middle" font-size="70" opacity="0.12">❄️</text>' +
      '<text x="375" y="500" text-anchor="middle" font-size="50" fill="#daa520">얼음 망자</text>'
  },
];

let html = '';
tests.forEach((t, i) => {
  const svg = BASE_START + GRADS + DEFS_END + t.body + BASE_END;
  const uri = 'data:image/svg+xml,' + encodeURIComponent(svg);
  html += '<div style="margin:8px;padding:8px;background:#444">' +
    '<p style="font-size:13px">' + t.label + '</p>' +
    '<img src="' + uri + '" width="150" style="border:2px solid ' + (i < 7 ? 'lime' : 'orange') + '">' +
    '</div>';
});
document.getElementById('tests').innerHTML = html;
</script>
</body></html>
