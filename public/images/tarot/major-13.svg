<g transform="translate(375,510)">
  <!-- Skeletal rider on horse -->
  <!-- Horse body -->
  <path d="M-40,10 Q-50,-10 -30,-15 Q0,-25 40,-10 Q45,10 30,15 Q0,20 -40,10 Z"
        fill="url(#gold)" opacity="0.45"/>
