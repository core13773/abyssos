<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abyssos Card Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a10; color: #e7e5e4; font-family: Georgia, serif; padding: 20px; }
  h1 { text-align: center; font-size: 28px; color: #f0d060; margin-bottom: 4px; }
  h2 { font-size: 20px; color: #daa520; margin: 36px 0 14px; border-bottom: 1px solid #292524; padding-bottom: 6px; }
  .sub { text-align: center; color: #78716c; margin-bottom: 24px; font-size: 13px; }
  .filters { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; position: sticky; top: 10px; z-index: 10; }
  .filters button { padding: 6px 14px; border-radius: 16px; border: 1px solid #44403c; background: #1c1917; color: #a8a29e; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .filters button:hover, .filters button.active { border-color: #daa520; color: #daa520; }
  .filters button.active { background: #2a2010; font-weight: bold; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
  .card { display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; }
  .card:hover { transform: translateY(-4px); }
  .card object { width: 100%; max-width: 300px; aspect-ratio: 750/1050; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); background: #1c1917; }
  .card .info { margin-top: 6px; font-size: 12px; color: #78716c; text-align: center; line-height: 1.5; }
  .card .info strong { color: #a8a29e; }
  .section { display: block; }
  .section.hidden { display: none; }
  @media (max-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; } body { padding: 10px; } h1 { font-size: 20px; } }
</style>
</head>
<body>

<h1>🔥 Abyssos v4.0 — Card Preview</h1>
<p class="sub">👾 Monster 18 + 👹 Gatekeeper 9 + ✨ Guardian 9 = 36 Cards</p>

<div class="filters">
  <button class="active" onclick="filter('all')">ALL</button>
  <button onclick="filter('monsters')">👾 Monsters</button>
  <button onclick="filter('gatekeepers')">👹 Gatekeepers</button>
  <button onclick="filter('guardians')">✨ Guardians</button>
</div>

<div id="monsters-section" class="section">
  <h2>👾 Monster Cards (18)</h2>
  <div class="grid" id="monsters-grid"></div>
</div>
<div id="gatekeepers-section" class="section">
  <h2>👹 Gatekeeper Cards (9)</h2>
  <div class="grid" id="gatekeepers-grid"></div>
</div>
<div id="guardians-section" class="section">
  <h2>✨ Guardian Cards (9)</h2>
  <div class="grid" id="guardians-grid"></div>
</div>

<script>

  {id:'monster-6a',c:6,t:'A',name:'불꽃 교리관',en:'Flame Dogmatist',p:4},

  {id:'monster-5a',c:5,t:'A',name:'진흙 익사자',en:'Mud Drowner',p:4},
  {id:'monster-5b',c:5,t:'B',name:'스틱스 히드라',en:'Styx Hydra',p:8},
  {id:'monster-4a',c:4,t:'A',name:'인색한 망령',en:'Miser Wraith',p:4},
  {id:'monster-4b',c:4,t:'B',name:'황금 탐식자',en:'Gold Devourer',p:8},
  {id:'monster-3a',c:3,t:'A',name:'악취 구더기',en:'Stench Maggot',p:5},
  {id:'monster-3b',c:3,t:'B',name:'식인 식물',en:'Maneater Plant',p:8},
  {id:'monster-2a',c:2,t:'A',name:'바람 망령',en:'Wind Wraith',p:5},
  {id:'monster-2b',c:2,t:'B',name:'허리케인 와이번',en:'Hurricane Wyvern',p:9},
  {id:'monster-1a',c:1,t:'A',name:'고대 철학자',en:'Ancient Sage',p:5},
  {id:'monster-1b',c:1,t:'B',name:'플라톤의 이데아',en:"Plato's Ideal",p:10}

  {id:'gk-8',c:8,name:'위장의 군주',en:'Lord of Masks',p:5},
  {id:'gk-7',c:7,name:'피의 파수꾼',en:'Blood Sentinel',p:5},
  {id:'gk-6',c:6,name:'불꽃 심문관',en:'Flame Inquisitor',p:5},
  {id:'gk-5',c:5,name:'분노의 화신',en:'Avatar of Wrath',p:6},

];

function makeCard(c, folder) {
  var d = document.createElement('div');
  d.className = 'card';

  // Use OBJECT tag instead of IMG for reliable SVG rendering
  var obj = document.createElement('object');
  obj.data = '/images/' + folder + '/' + c.id + '.svg';
  obj.type = 'image/svg+xml';
  d.appendChild(obj);

  var info = document.createElement('div');
  info.className = 'info';
  var extra = c.p ? ' ⚔'+c.p : '';
  extra += c.t ? ' Tier:'+c.t : '';
  extra += c.tp ? ' '+c.tp : '';
  info.innerHTML = '<strong>'+c.name+'</strong><br>'+c.en+'<br>Circle '+c.c+extra;
  d.appendChild(info);
  return d;
}

function populate(gridId, cards, folder) {
  var grid = document.getElementById(gridId);
  cards.forEach(function(c) { grid.appendChild(makeCard(c, folder)); });
}

populate('monsters-grid', MONSTERS, 'monsters');
populate('gatekeepers-grid', GATEKEEPERS, 'gatekeepers');
populate('guardians-grid', GUARDIANS, 'guardians');

function filter(type) {
  document.querySelectorAll('.filters button').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('monsters-section').className = 'section' + (type==='all'||type==='monsters'?'':' hidden');
  document.getElementById('gatekeepers-section').className = 'section' + (type==='all'||type==='gatekeepers'?'':' hidden');
  document.getElementById('guardians-section').className = 'section' + (type==='all'||type==='guardians'?'':' hidden');
}
</script>
</body>
</html>
