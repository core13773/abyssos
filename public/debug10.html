<!DOCTYPE html>
<html><body style="background:#333;padding:20px;color:#fff">
<h1>Gradient hypothesis test</h1>

<div style="margin:10px;padding:10px;background:#444">
  <p>1: Hyphen in ID (elemBg-monster-9a)</p>
  <img src="/test-hyphen.svg" width="250" style="border:2px solid red">
</div>

<div style="margin:10px;padding:10px;background:#444">
  <p>2: No hyphen in ID (elemBg)</p>
  <img src="/test-nohyphen.svg" width="250" style="border:2px solid lime">
</div>

<div style="margin:10px;padding:10px;background:#444">
  <p>3: Multiple gradients (6 gradients, 3 used)</p>
  <img src="/test-multigrad.svg" width="250" style="border:2px solid yellow">
</div>

<div style="margin:10px;padding:10px;background:#444">
  <p>4: Actual step5.svg (copy of monster-9a)</p>
  <img src="/step5.svg" width="250" style="border:2px solid orange">
</div>

<div style="margin:10px;padding:10px;background:#444">
  <p>5: step5 but all IDs simplified (no hyphens)</p>
  <img id="img5" width="250" style="border:2px solid cyan">
</div>

<script>
fetch('/step5.svg')
  .then(r => r.text())
  .then(svg => {
    // Replace all hyphenated IDs with simple ones
    svg = svg.replace(/id="elemBg-monster-9a"/g, 'id="ebg"');
    svg = svg.replace(/id="elemGlow-monster-9a"/g, 'id="egl"');
    svg = svg.replace(/#elemBg-monster-9a/g, '#ebg');
    svg = svg.replace(/#elemGlow-monster-9a/g, '#egl');
    document.getElementById('img5').src = 'data:image/svg+xml,' + encodeURIComponent(svg);
  });
</script>
</body></html>
