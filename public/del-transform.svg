<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 1050" width="750" height="1050">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="25%" stop-color="#daa520"/>
      <stop offset="50%" stop-color="#f5e6a0"/>
      <stop offset="75%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#f0d060"/>
    </linearGradient>
    <linearGradient id="goldV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f5e6a0"/>
      <stop offset="30%" stop-color="#daa520"/>
      <stop offset="60%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#f0d060"/>
    </linearGradient>
    <linearGradient id="goldSubtle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a08030"/>
      <stop offset="50%" stop-color="#c4a040"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
    <radialGradient id="divineGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f5e6a0" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#daa520" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1a1208" stop-opacity="0"/>
    </radialGradient>
    
  <linearGradient id="elemGrad-monster-9a" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#4a90b8" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#7ec8e3" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="elemBg-monster-9a" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0a1218"/>
    <stop offset="50%" stop-color="#0a0a10"/>
    <stop offset="100%" stop-color="#0a1218"/>
  </linearGradient>
  <radialGradient id="elemGlow-monster-9a" cx="50%" cy="35%" r="40%">
    <stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#0a0a10" stop-opacity="0"/>
  </radialGradient>
  </defs>
  
  <!-- Card background -->
  <rect width="750" height="1050" fill="url(#elemBg-monster-9a)"/>
  <rect x="30" y="30" width="690" height="990" rx="12" ry="12"
        fill="none" stroke="#7ec8e3" stroke-width="4"/>
  <rect x="36" y="36" width="678" height="978" rx="9" ry="9"
        fill="none" stroke="#4a90b8" stroke-width="1" opacity="0.5"/>

  <!-- Central glow behind illustration area -->
  <rect x="30" y="30" width="690" height="990" rx="12" ry="12" fill="url(#elemGlow-monster-9a)"/>

  <!-- Corner ornaments -->
  <path d="M34 52 Q34 34 52 34 M34 46.6 Q39.4 39.4 46.6 34" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M698 34 Q716 34 716 52 M703.4 34 Q710.6 39.4 716 46.6" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M34 998 Q34 1016 52 1016 M34 1003.4 Q39.4 1010.6 46.6 1016" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M698 1016 Q716 1016 716 998 M703.4 1016 Q710.6 1010.6 716 1003.4" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Tier badge (A or B) at top -->
  <rect x="335" y="42" width="80" height="34" rx="17"
        fill="#22c55e" opacity="0.85"/>
  <text x="375" y="66" text-anchor="middle"
        font-family="serif" font-size="18" font-weight="bold"
        fill="#fff" letter-spacing="2">
    MINOR
  </text>

  <!-- Separator under badge -->
  <line x1="305" y1="90" x2="445" y2="90"
        stroke="#7ec8e3" stroke-width="1" opacity="0.4"/>
  <circle cx="375" cy="90" r="3" fill="#7ec8e3" opacity="0.6"/>

  <!-- Card name (Korean) at bottom -->
  <text x="375" y="950" text-anchor="middle"
        font-family="serif" font-size="28" font-weight="bold"
        fill="#7ec8e3" letter-spacing="3">얼음 망자</text>

  <!-- Card name (English) -->
  <text x="375" y="982" text-anchor="middle"
        font-family="serif" font-size="14" font-style="italic"
        fill="#b8dff0" opacity="0.7" letter-spacing="2">Frost Wraith</text>
  
    <!-- Elemental aura ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#7ec8e3" stroke-width="2" opacity="0.2"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#7ec8e3" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="0" r="80" fill="#7ec8e3" opacity="0.06"/>

    <!-- Power number (large, central) -->
    <text x="0" y="10" text-anchor="middle" font-family="serif"
          font-size="72" font-weight="bold" fill="#7ec8e3" opacity="0.85"
         >3</text>
    <text x="0" y="-40" text-anchor="middle" font-family="serif"
          font-size="14" fill="#b8dff0" opacity="0.6" letter-spacing="3">POWER</text>

    <!-- Element icon in background -->
    <text x="0" y="-95" text-anchor="middle" font-size="70" opacity="0.12">❄️</text>

    <!-- Special ability callout box -->
    <rect x="-200" y="50" width="400" height="65" rx="8" fill="#0a1218" opacity="0.6"
          stroke="#7ec8e3" stroke-width="1" opacity="0.5"/>
    <text x="0" y="72" text-anchor="middle" font-family="serif"
          font-size="12" fill="#b8dff0" opacity="0.9">ABILITY</text>

    <!-- Ability text (split into 2 lines if long) -->
    <text x="0" y="90" text-anchor="middle"
           font-family="serif" font-size="13"
           fill="#b8dff0" opacity="0.85">없음</text>
  
</svg>