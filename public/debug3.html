<!DOCTYPE html>
<html><body style="background:#444;padding:20px;color:#fff">
<h1>Step-by-step SVG simplification</h1>

<div style="margin:10px;padding:10px;background:#555">
  <p>1: Original file as img</p>
  <img src="/images/monsters/monster-9a.svg" width="250" style="border:2px solid red">
</div>
<div style="margin:10px;padding:10px;background:#555">
  <p>2: Same file as object</p>
  <object data="/images/monsters/monster-9a.svg" type="image/svg+xml" width="250" height="350" style="border:2px solid green"></object>
</div>
<div style="margin:10px;padding:10px;background:#555">
  <p>3: Same file as iframe</p>
  <iframe src="/images/monsters/monster-9a.svg" width="250" height="350" style="border:2px solid blue"></iframe>
</div>
<div style="margin:10px;padding:10px;background:#555">
  <p>4: Inline SVG (copy-pasted content)</p>
  <div id="inline4" style="border:2px solid yellow"></div>
</div>
<div style="margin:10px;padding:10px;background:#555">
  <p>5: Inline SVG with ALL defs/filters/gradients removed</p>
  <svg id="inline5" width="250" height="350" viewBox="0 0 750 1050" xmlns="http://www.w3.org/2000/svg" style="border:2px solid cyan"></svg>
</div>

<script>
fetch('/images/monsters/monster-9a.svg')
  .then(r => r.text())
  .then(svgText => {
    // Test 4: inline the raw SVG
    document.getElementById('inline4').innerHTML = svgText;

    // Test 5: strip everything, just keep rects and text
    let clean = svgText
      .replace(/<defs>[\s\S]*?<\/defs>/g, '')
      .replace(/\s*filter="[^"]*"/g, '')
      .replace(/fill="url\([^)]*\)"/g, 'fill="#1a1a2e"')
      .replace(/stroke="url\([^)]*\)"/g, 'stroke="#daa520"')
      .replace(/stop-opacity="[^"]*"/g, '')
      .replace(/font-family="[^"]*"/g, '')
      .replace(/letter-spacing="[^"]*"/g, '')
      .replace(/opacity="[^"]*"/g, 'opacity="1"')
      .replace(/<filter[\s\S]*?<\/filter>/g, '')
      .replace(/<linearGradient[\s\S]*?<\/linearGradient>/g, '')
      .replace(/<radialGradient[\s\S]*?<\/radialGradient>/g, '');
    
    document.getElementById('inline5').innerHTML = clean;
    console.log('Stripped SVG length:', clean.length);
    console.log('First 500 chars:', clean.substring(0, 500));
  });
</script>
</body></html>
